<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            width: 260px;
            padding: 10px;
            margin: 0;
            background: #0f172a;
            color: #e5e7eb;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 0 10px 0;
            font-size: 15px;
            font-weight: 600;
        }

        .logo {
            width: 16px;
            height: 16px;
        }

        label {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            opacity: .8;
        }

        input {
            width: 100%;
            margin-top: 3px;
            padding: 5px 7px;
            border-radius: 7px;
            border: 1px solid #334155;
            background: #020617;
            color: #e5e7eb;
            outline: none;
            font-size: 12px;
            transition: border .15s ease, box-shadow .15s ease;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border-radius: 9px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
            font-size: 14px;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        .small {
            font-size: 11px;
            opacity: .6;
            margin-top: 6px;
            text-align: center;
            line-height: 1.3;
        }

        .support {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #1e293b;
            text-align: center;
        }

        .support a {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 9px;
            border-radius: 10px;
            background: #f59e0b;
            color: black;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all .15s ease;
            font-size: 14px;
        }

        .support a:hover {
            background: #fbbf24;
            transform: scale(1.03);
        }

        .support a:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <h3 class="title">
        <img src="icons/icon16.png" class="logo">
        DOM Cleaner
    </h3>

    <label>Collapse user text more than X lines</label>
    <input id="collapseTextAfterLines" type="number">

    <label>Collapse code after messages</label>
    <input id="codeCollapseAfter" type="number">

    <label>Visible messages</label>
    <input id="visibleMessages" type="number">

    <label>Trim trigger</label>
    <input id="trimTrigger" type="number">

    <label>Aggressive keep</label>
    <input id="aggressiveKeep" type="number">

    <label>Soft DOM limit</label>
    <input id="softLimit" type="number">

    <label>Hard DOM limit</label>
    <input id="hardLimit" type="number">

    <button id="save">Save settings</button>

    <p class="small">
        Refresh ChatGPT tab after changing settings.
    </p>

    <div class="support">

        <p class="small">
            If this extension helped keep ChatGPT fast during long sessions,
            consider supporting development.
        </p>

        <a href="https://buymeacoffee.com/mathijsk" target="_blank">
            ☕ Buy me a coffee
        </a>

    </div>

    <script src="popup.js"></script>

</body>

</html>
