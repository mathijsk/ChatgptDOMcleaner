<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
font-family:sans-serif;
width:240px;
padding:10px;
}

label{
display:block;
margin-top:8px;
font-size:12px;
}

input{
width:100%;
}

button{
margin-top:10px;
width:100%;
}

.small{
font-size:11px;
opacity:.7;
}

.support{
margin-top:12px;
padding-top:8px;
border-top:1px solid #ddd;
text-align:center;
}

.support a{
display:inline-block;
margin-top:6px;
font-size:12px;
text-decoration:none;
}

</style>
</head>

<body>

<h3>DOM Cleaner</h3>

<label>Collapse user text more then x lines</label>
<input id="collapseTextAfterLines" type="number">

<label>Collapse code after messages</label>
<input id="codeCollapseAfter" type="number">

<label>Visible messages</label>
<input id="visibleMessages" type="number">

<label>Trim trigger</label>
<input id="trimTrigger" type="number">

<label>Aggressive keep</label>
<input id="aggressiveKeep" type="number">

<label>Soft DOM limit</label>
<input id="softLimit" type="number">

<label>Hard DOM limit</label>
<input id="hardLimit" type="number">

<button id="save">Save settings</button>

<p class="small">
Refresh ChatGPT tab after changing settings.
</p>

<div class="support">

<p class="small">
If this extension helped keep ChatGPT fast during long sessions,
consider supporting development.
</p>

<a href="https://buymeacoffee.com/mathijsk" target="_blank">
☕ Buy me a coffee
</a>

</div>

<script src="popup.js"></script>

</body>
</html>
